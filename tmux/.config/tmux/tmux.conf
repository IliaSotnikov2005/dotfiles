# Enable Colors
set -g default-terminal 'tmux-256color'
set -ag terminal-overrides ",xterm-256color:RGB"

set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Prefix key
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Open new windows in current directory path
bind c new-window -c "#{pane_current_path}"

# Split windows
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Reload Config
unbind r
bind r source-file "$TMUX_CONF" \; display-message "󰑓 Config reloaded"

# Resize Panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# Enable Mouse
set -g mouse on

# Scrollback
set -g history-limit 50000

# VIM Motions
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Enable Mouse Dragging
unbind -T copy-mode-vi MouseDragEnd1Pane

# Status Line Position
set-option -g status-position top

# Base index 1
set -g base-index 1
set -g pane-base-index 1

# Focus events
set -g focus-events on

# Автоматическая установка TPM при отсутствии
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Auto Save / Restore
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '1'

# Замена стандартного choose-window (Ctrl+b w)
unbind w
bind-key w display-popup -E -w 40% -h 50% ~/.config/tmux/scripts/tmux-menu.fish --windows

# Для сессий (Ctrl+b s)
unbind s
bind-key s display-popup -E -w 40% -h 50% ~/.config/tmux/scripts/tmux-menu.fish --sessions

# Отдельная кнопка для меню
bind-key M display-popup -E -w 45% -h 60% ~/.config/tmux/scripts/tmux-menu.fish

# Scratch terminal (toggle)
run 'tmux has-session -t _popup_scratchpad 2>/dev/null || tmux new-session -d -s _popup_scratchpad'
run 'tmux set-option -t _popup_scratchpad status off 2>/dev/null'
run 'tmux set-option -t _popup_scratchpad prefix None 2>/dev/null'
bind -n C-t if-shell -F "#{==:#{session_name},_popup_scratchpad}" "detach-client" "display-popup -E -w 80% -h 80% ~/.config/tmux/scripts/tmux-scratch.sh"

# Pop-Up: LazyGit
bind g display-popup -d "#{pane_current_path}" -w 80% -h 80% -E lazygit

# Custom Theme
source-file ~/.config/tmux/theme.conf

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

